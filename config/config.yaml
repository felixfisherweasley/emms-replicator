database:
  type: duckdb
  path: ~/mms/mms.duckdb

tables:
  - DISPATCHPRICE
  # - DISPATCHLOAD
  - DISPATCHREGIONSUM
  - TRADINGPRICE
  # - TRADINGREGIONSUM
  - DUDETAIL
  - DUDETAILSUMMARY
  - DISPATCHINTERCONNECTORRES
  # - TRADINGINTERCONNECT
  - TRANSMISSIONLOSSFACTOR
  - ROOFTOP_PV_ACTUAL
  # - ROOFTOP_PV_FORECAST

sources:
  current: https://nemweb.com.au/Reports/Current/
  archive: https://nemweb.com.au/Reports/ARCHIVE/
  mmsdm_base: https://nemweb.com.au/Data_Archive/Wholesale_Electricity/MMSDM/

# Optional feed mapping for NEMWeb Archive URLs where one bundle zip can contain many tables.
# Each feed can map to one or more logical tables so month-level skip checks can still work.
# include_patterns are optional filename substrings to filter relevant bundle zips on that feed.
archive_feeds:
  # - name: dispatch_archive
  #   url: https://nemweb.com.au/Reports/ARCHIVE/Dispatch/
  #   tables: [DISPATCHPRICE, DISPATCHREGIONSUM, DISPATCHINTERCONNECTORRES]
  #   include_patterns: [DISPATCH]
  # - name: trading_archive
  #   url: https://nemweb.com.au/Reports/ARCHIVE/Trading/
  #   tables: [TRADINGPRICE]
  #   include_patterns: [TRADING]

# Optional feed mapping for NEMWeb Current URLs.
# Use specific subdirectories where zip files are published.
current_feeds:
  # - name: dispatchis
  #   url: https://nemweb.com.au/Reports/Current/DispatchIS_Reports/
  #   tables: [DISPATCHPRICE, DISPATCHREGIONSUM, DISPATCHINTERCONNECTORRES]
  #   include_patterns: [DISPATCH]
  # - name: rooftop_actual
  #   url: https://nemweb.com.au/Reports/Current/ROOFTOP_PV/ACTUAL/
  #   tables: [ROOFTOP_PV_ACTUAL]
  #   include_patterns: [ROOFTOP, ACTUAL]

data_directory: ./data
log_directory: ./logs
tracking_file: ./data/loaded_tracking.csv

batcher:
  download_dir: ./data/downloads
  extract_dir: ./data/extracted
  start_year: 2026
  end_year: 2026
  months: [1, 2, 3]
  current_poll_interval_seconds: 300
  # Operational mode is selected at runtime via --source.
  # Supported: mmsdm (historical), archive (feed-mapped backfill), current (live polling).

loader:
  scan_dir: ./data/extracted
  processed_dir: ./data/processed
  poll_interval_seconds: 30

# Optional table model metadata for key/index creation on first table creation.
# Fill these from the AEMO data model report.
table_model:
  DISPATCHPRICE:
    primary_key: [SETTLEMENTDATE, RUNNO, REGIONID, DISPATCHINTERVAL, INTERVENTION]
    indexes:
      - name: idx_dispatchprice_settlementdate
        columns: [LASTCHANGED]
  DISPATCHREGIONSUM:
    primary_key: [SETTLEMENTDATE, RUNNO, REGIONID, DISPATCHINTERVAL, INTERVENTION]
    indexes:
      - name: idx_dispatchregionsum_settlementdate
        columns: [LASTCHANGED]
  TRADINGPRICE:
    primary_key: [SETTLEMENTDATE, RUNNO, REGIONID, PERIODID]
    indexes:
      - name: idx_tradingprice_settlementdate
        columns: [LASTCHANGED]
  DUDETAIL:
    primary_key: [DUID, EFFECTIVEDATE, VERSIONNO]
    indexes:
      - columns: [LASTCHANGED]
  DUDETAILSUMMARY:
    primary_key: [DUID, START_DATE]
    indexes:
      - columns: [LASTCHANGED]
  DISPATCHINTERCONNECTORRES:
    primary_key: [SETTLEMENTDATE, RUNNO, INTERCONNECTORID, INTERVENTION, DISPATCHINTERVAL]
    indexes:
      - name: idx_dispatchinterconnectorres_settlementdate
        columns: [LASTCHANGED]  
  TRANSMISSIONLOSSFACTOR:
    primary_key: [CONNECTIONPOINTID, EFFECTIVEDATE, VERSIONNO]
    indexes:
      - name: idx_transmissionlossfactor_settlementdate
        columns: [LASTCHANGED]
  ROOFTOP_PV_ACTUAL:
    primary_key: [INTERVAL_DATETIME, TYPE, REGIONID]
    indexes:
      - name: idx_rooftop_pv_actual_settlementdate
        columns: [INTERVAL_DATETIME, TYPE, REGIONID]